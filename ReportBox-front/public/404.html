<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SEVAK</title>
    <!-- GitHub Pages serves this for any unknown path. It encodes the requested
         path into a query string and redirects to the app root, where the
         decoder in index.html restores it. Lets BrowserRouter deep links work.
         pathSegmentsToKeep = 1 keeps the "/Sevak" project-page prefix.
         https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
