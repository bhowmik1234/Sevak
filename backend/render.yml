# render.yaml — FastAPI (Legal Assistant) backend
services:
  - type: web
    name: sevak-fastapi
    env: python
    # `prisma py fetch` downloads the query-engine binary into the persisted
    # PRISMA_BINARY_CACHE_DIR (see below); `prisma migrate deploy` applies
    # pending migrations (incl. Feedback) to the database during the build.
    buildCommand: "pip install -r requirements.txt && prisma py fetch && prisma generate && prisma migrate deploy"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Pin Python: Render's default (3.14) has no prebuilt pydantic-core wheel,
      # forcing a Rust source build that fails on Render's read-only FS. 3.12 has
      # wheels for every dependency. (Also pinned via backend/.python-version.)
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Cache the Prisma query-engine binary INSIDE the persisted project dir.
      # The default (~/.cache = /opt/render/.cache) is wiped between build and
      # runtime, causing "BinaryNotFoundError" at startup.
      - key: PRISMA_BINARY_CACHE_DIR
        value: "/opt/render/project/src/.prisma-binaries"
      # Set these in the Render dashboard (sync: false = not stored in repo).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      # Vector DB — Pinecone serverless (always-on, free starter plan).
      - key: VECTOR_STORE
        value: "pinecone"
      - key: PINECONE_API_KEY
        sync: false
      # Defaults match the free serverless starter; the index auto-creates on
      # first ingest with the embedder's dimension (Gemini = 768).
      - key: PINECONE_INDEX
        value: "sevak"
      - key: PINECONE_CLOUD
        value: "aws"
      - key: PINECONE_REGION
        value: "us-east-1"
      - key: FRONTEND_URL
        sync: false
      # --- RAG: free profile (all via Gemini API, no local ML) ---
      - key: EMBEDDINGS_PROVIDER
        value: "gemini"
      - key: LLM_PROVIDER
        value: "gemini"
      - key: GEMINI_MODEL
        value: "models/gemini-2.5-flash"
      - key: GEMINI_EMBED_MODEL
        value: "models/gemini-embedding-001"
      - key: RELEVANCE_THRESHOLD
        value: "0.30"
      - key: GROUNDEDNESS_ENABLED
        value: "true"
      - key: GROUNDEDNESS_METHOD
        value: "judge"
      - key: QUERY_REWRITE_ENABLED
        value: "true"
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: CLEANUP_INTERVAL_MINUTES
        value: "60"
      - key: MESSAGE_RETENTION_MINUTES
        value: "1440"
